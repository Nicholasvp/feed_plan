name: feed_plan
description: "Planeje visualmente seus carrosséis e fotos do Instagram."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.7

  # Database
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Routing
  go_router: ^14.8.1

  # Media
  image_picker: ^1.1.2
  gal: ^2.3.0

  # Utilities
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8

  # Monetization
  purchases_flutter: ^8.3.0

  # Environment
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/feed_plan.png"
  remove_alpha_ios: true
